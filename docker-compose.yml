# Train runs on startup if no model exists (creates models/artifacts/model_*_baseline.pkl).
# Now uses improved training with bias correction and better validation.
# Ensure data/processed/train_features.csv exists (run features pipeline or copy training data).
services:
  api:
    build: .
    container_name: pdv_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MODELS_ARTIFACTS_DIR=/app/models/artifacts
    volumes:
      - ./:/app:cached
    command: >
      sh -c "
        (find /app/models/artifacts -maxdepth 1 -name 'model_*_baseline.pkl' 2>/dev/null | grep -q .) ||
        (python -m src.models.train --tag improved || true);
        exec uvicorn src.serve.api:app --host 0.0.0.0 --port 8000
      "

  streamlit:
    build: .
    container_name: pdv_streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - MODELS_ARTIFACTS_DIR=/app/models/artifacts
    volumes:
      - ./:/app:cached
    command: >
      sh -c "
        (find /app/models/artifacts -maxdepth 1 -name 'model_*_baseline.pkl' 2>/dev/null | grep -q .) ||
        (python -m src.models.train || true);
        exec streamlit run src/ui/dashboard.py --server.port 8501 --server.address 0.0.0.0
      "

  streamlit_admin:
    build: .
    container_name: pdv_streamlit_admin
    ports:
      - "8502:8502"
    environment:
      - PYTHONPATH=/app
      - MODELS_ARTIFACTS_DIR=/app/models/artifacts
    volumes:
      - ./:/app:cached
    command: >
      sh -c "
        (find /app/models/artifacts -maxdepth 1 -name 'model_*_baseline.pkl' 2>/dev/null | grep -q .) ||
        (python -m src.models.train || true);
        exec streamlit run src/ui/streamlit_app.py --server.port 8502 --server.address 0.0.0.0
      "
